brand_id: "aquacorp_global"
brand_name: "AquaCorp"

voice_and_tone:
  personality: ["refreshing", "honest", "energetic"]
  avoid: ["clinical", "aggressive", "hyperbolic"]

visual_identity:
  primary_color: "#00B4D8"
  secondary_color: "#023E8A"
  accent_color: "#90E0EF"
  primary_colors: ["#00B4D8", "#FFFFFF", "#023E8A"]
  accent_colors: ["#90E0EF"]
  logo_path: "inputs/assets/global/logo.png"
  logo_placement: "top-right"
  # When the configured placement crowds the focal/product area, the composer
  # tries the alternates in this list (in order). Empty list = legacy
  # behavior (fixed placement, no fallback).
  logo_allowed_positions: ["top-right", "top-left", "bottom-right", "bottom-left"]
  # Logo must keep this much breathing room from the focal/product safe
  # zone. ``logo_product_clearance_pct`` is a fraction of min(W, H);
  # ``min_logo_product_gap_px`` per aspect is the absolute floor.
  logo_product_clearance_pct: 0.035
  min_logo_product_gap_px:
    "1x1": 36
    "9x16": 42
    "16x9": 48
  hard_fail_logo_product_collision: true
  safe_zone_pct: 0.06
  logo_height_pct: 0.085
  logo_treatment: badge
  logo_badge_opacity: 0.72
  logo_badge_color: "#FFFFFF"

typography:
  headline_font: "Montserrat-Bold.ttf"
  body_font: "OpenSans-Regular.ttf"
  fonts_dir: "fonts"
  text_color_on_dark: "#FFFFFF"
  text_color_on_light: "#023E8A"
  headline_size_ratio: 0.062
  body_size_ratio: 0.018
  headline_case: "sentence"

  # Aspect-ratio-specific typography targets. The composer honors these as
  # hard min/max font-size floors and ceilings (in pixels) and a target
  # vertical-fill ratio inside the headline box. QCCheckerAgent independently
  # measures the final-render contrast.
  per_aspect:
    "1x1":
      # Candidate boxes are now taller (h≈0.28) so the composer can scale
      # the headline confidently when the box is clean. The ceiling and
      # zone-fill target are the levers — the composer always picks the
      # *largest* fitting size in [min, max] subject to line-count bounds,
      # so raising max + raising target_zone_fill yields visibly larger
      # campaign copy on clean photography.
      headline_min_font_size_px: 56
      headline_max_font_size_px: 96
      headline_target_zone_fill_pct: 0.66
      preferred_line_count: 2
      disclaimer_min_font_size_px: 18
      disclaimer_max_font_size_px: 26
      disclaimer_font_size_pct_of_height: 0.018

    "9x16":
      # Candidate boxes pulled to the left third (x_max ≤ 0.52) and
      # taller (h≈0.24) so a 2-line hero headline at 90–100px reads as
      # confident campaign copy, not a caption.
      headline_min_font_size_px: 52
      headline_max_font_size_px: 118
      headline_target_zone_fill_pct: 0.68
      preferred_line_count: 2
      disclaimer_min_font_size_px: 20
      disclaimer_max_font_size_px: 28
      disclaimer_font_size_pct_of_height: 0.014

    "16x9":
      # 16:9 is the campaign hero shape — copy should feel large and
      # intentional. Candidate boxes are 0.30 high; the composer can hit
      # ~110px on a 2-line headline within that budget. Object-clearance
      # gate still applies, so crowded photography won't push the headline
      # past the ceiling.
      headline_min_font_size_px: 86
      headline_max_font_size_px: 132
      headline_target_zone_fill_pct: 0.70
      preferred_line_count: 2
      # Legal must remain readable; previous 16:9 disclaimer was ~19px,
      # well into "microcopy" territory. Floor raised from 24 → 30 so the
      # legal line clears its own readability bar without shrinking.
      disclaimer_min_font_size_px: 30
      disclaimer_max_font_size_px: 38
      disclaimer_font_size_pct_of_height: 0.030

# Palette guidance — applied to the image-gen prompt. Each campaign can override.
generation_palette_hint: "cyan, deep navy, clean white, fresh water tones, bright summer highlights"
brand_palette_influence: medium

# Photographic composition direction — fed to the image-generation prompt so
# source photography ships with natural negative space for headline copy.
# This is the primary readability mechanism; the composer's panel/badge
# treatments are last-resort fallbacks, not the default.
image_composition_guidance:
  negative_space_required: true
  negative_space_location_by_aspect:
    "1x1": "lower-left clean area, product upper-right"
    "9x16": "lower-third clean area, product upper-center"
    "16x9": "left third clean negative space, product center-right or right third"
  text_safe_area_prompt: >
    Leave a clean, softly blurred area with low visual detail for headline copy.
  avoid_behind_text:
    - "striped towels"
    - "busy fabric patterns"
    - "product edges"
    - "hands"
    - "labels"
    - "high-contrast clutter"
    - "small objects"
    - "sharp horizon lines through the copy area"
  preferred_behind_text:
    - "soft ocean gradient"
    - "clean sky"
    - "smooth sand"
    - "blurred beach background"
    - "simple light-to-mid tone area"
  product_position_by_aspect:
    "1x1": "upper-right or center-right, leaving a clean lower-left for copy"
    "9x16": "upper-center, leaving lower third for copy"
    "16x9": "center-right or right third, leaving left third for copy"
  depth_of_field: "shallow depth of field, copy area softly blurred"
  composition_style: "premium commercial product photography with intentional copy space"

# Layout templates — composer reads template_name from the brief, then this map.
# Add new templates without touching code.
layout_templates:

  # Legacy template (still works). Heavy horizontal scrim across the bottom.
  hero_full_bleed_footer:
    overlay_style: scrim
    overlay_opacity_pct: 0.40
    overlay_extent_pct: 0.30
    headline_size_ratio: 0.07
    body_size_ratio: 0.022
    luminance_threshold: 140
    accent_style: none
    disclaimer_placement: under_headline
    text_align_default: center

  # Polished campaign-creative layout. Soft vertical gradient from the bottom,
  # per-aspect headline boxes that avoid the product focal area, brand accent
  # rail, disclaimer in a clean bottom corner. Local readability treatments
  # (soft panel behind headline, soft badge behind disclaimer) keep copy
  # legible over busy photography without resorting to a hard scrim.
  premium_product_hero:
    overlay_style: vertical_gradient
    overlay_opacity_pct: 0.65
    overlay_extent_pct: 0.50
    headline_size_ratio: 0.060
    body_size_ratio: 0.018
    luminance_threshold: 140
    accent_style: side_rail
    accent_color_role: primary
    accent_thickness_pct: 0.006
    disclaimer_placement: bottom_corner
    disclaimer_padding_pct: 0.030
    text_align_default: left

    # Default headline readability is delivered by the photography itself
    # (see image_composition_guidance above). The composer applies a subtle
    # text shadow as the always-on perceptual aid, and only escalates further
    # when its contrast estimate falls below brand.qc threshold — see
    # readability_fallback_order below.
    headline_background_treatment: none
    headline_panel_opacity_pct: 0.55
    headline_panel_padding_pct: 0.030
    headline_panel_corner_radius_pct: 0.015
    headline_text_shadow: true
    avoid_textured_regions: true

    # Disclaimer relies on natural composition + the small body font; the
    # disclaimer-contrast QC rule is the safety net.
    disclaimer_background_treatment: none
    disclaimer_badge_opacity_pct: 0.55
    disclaimer_badge_padding_pct: 0.018
    disclaimer_badge_corner_radius_pct: 0.012

    # Escalation order when the composer's contrast estimate fails the brand
    # threshold. The composer walks this list in order until one step pushes
    # contrast over the bar, and records which step was used in the report.
    readability_fallback_order:
      - choose_best_brand_text_color
      - subtle_text_shadow
      - reposition_within_text_safe_area
      - subtle_local_gradient
      - soft_panel_last_resort

    # Candidate-headline scoring + focal-area protection. Layout-level toggles
    # gate the scorer; per-aspect blocks below carry the actual candidate
    # boxes and line-count constraints.
    enable_candidate_headline_scoring: true
    avoid_busy_text_regions: true
    avoid_focal_overlap: true
    focal_area_padding_pct: 0.04
    text_region_max_edge_density: 0.18
    text_region_max_texture_score: 0.55
    focal_overlap_penalty_weight: 0.6

    # Object-clearance / breathing-room rules. The composer expands the focal
    # safe zone by ``object_text_clearance_pct * min(W, H)`` AND by the
    # per-aspect ``min_text_object_gap_px`` (whichever is larger); candidate
    # boxes that fall inside the expanded zone are penalized; ones inside
    # the *unexpanded* zone are hard-rejected when
    # ``hard_fail_text_object_collision`` is True.
    object_text_clearance_pct: 0.045
    min_text_object_gap_px:
      "1x1": 52
      "9x16": 56
      "16x9": 64
    object_clearance_penalty: 0.85
    hard_fail_text_object_collision: true
    # Near-miss = rendered text bbox closer than min_text_object_gap_px to
    # the unexpanded focal safe zone. When true, the candidate is hard-failed
    # if any alternative passes; the composer also tries a sequence of
    # deterministic shifts (left/up/down/narrow) on the rendered bbox before
    # giving up on this candidate.
    hard_fail_text_object_near_miss: true

    # Crop safety / anti-clipping. Before composing, the composer scores
    # several crop offsets and rejects ones that clip the focal/product
    # cluster against a canvas edge. ``focal_edge_clearance_pct`` is a
    # fraction of min(W, H); ``min_focal_edge_gap_px`` per aspect is the
    # absolute floor.
    focal_edge_clearance_pct: 0.045
    min_focal_edge_gap_px:
      "1x1": 48
      "9x16": 56
      "16x9": 64
    hard_fail_focal_edge_clip: true
    crop_edge_clip_penalty: 0.90

    # Accent rail / underline must respect a left/right safe margin from
    # the canvas edge so the brand mark doesn't hug the frame.
    accent_safe_zone_pct: 0.065
    min_accent_edge_gap_px:
      "1x1": 48
      "9x16": 52
      "16x9": 56

    # Disclaimer candidate boxes — composer scores them and picks the one
    # with best contrast + clearance from focal/product. First candidate is
    # the configured preference; subsequent ones are alternates the
    # composer can fall back to when the preferred zone is crowded.
    # Disclaimer candidate boxes are TIGHT corners (x_max − x_min ≈ 0.30
    # of canvas width) so the right-aligned text actually hugs the
    # corner instead of floating toward mid-bottom. A wider candidate
    # box used to make "Terms and conditions apply." sit halfway across
    # the frame because the text was right-aligned within a 0.40-wide
    # box. Tight corners + right-alignment = visually anchored.
    disclaimer_candidate_boxes:
      "1x1":
        - [0.66, 0.91, 0.94, 0.96]
        - [0.06, 0.91, 0.34, 0.96]
      "9x16":
        - [0.62, 0.94, 0.94, 0.98]
        - [0.06, 0.94, 0.38, 0.98]
      "16x9":
        - [0.72, 0.88, 0.96, 0.94]
        - [0.05, 0.88, 0.30, 0.94]
    min_disclaimer_object_gap_px:
      "1x1": 32
      "9x16": 36
      "16x9": 42

    # Adaptive headline-box widening: extend the chosen candidate toward
    # the focal safe zone (up to min_text_object_gap_px clearance), capped
    # at this fraction of canvas width. Set 0 to disable.
    headline_widen_max_pct: 0.18

    # Hero-scale threshold for the fitter. When the candidate box is so
    # narrow that NO font size in [min, max] avoids single-word lines,
    # sizes ≥ this threshold are preferred over smaller multi-word
    # alternatives (poster typography vs. caption-sized copy). The
    # non-choppy preference still wins when achievable.
    headline_hero_scale_threshold_px: 80

    # Letterbox fallback when no crop offset clears the focal cluster
    # from the canvas edges. DISABLED for the demo brand: a colored matte
    # border around the hero photo reads as "weird graphic box" on
    # social campaign creatives, not as polished editorial work. When
    # this brand's source heroes clip the focal product, the composer
    # surfaces the issue via ``composition_warnings: ["focal_edge_clip"]``
    # so reviewers can flag the source for re-prompting; the rendered
    # creative continues to fill the whole canvas with photography.
    #
    # Set ``enable_focal_letterbox_when_clip_unavoidable: true`` for
    # brands that prefer a framed look (typical for editorial print
    # campaigns) — the rest of the letterbox knobs (color role, max pad)
    # are honored when enabled.
    enable_focal_letterbox_when_clip_unavoidable: false
    letterbox_color_role: auto       # auto | brand_primary | brand_secondary | brand_accent | sampled_edge
    letterbox_max_pad_pct: 0.08

    per_aspect:
      "1x1":
        # x_min = 0.07 keeps a visible left safe margin; x_max held at
        # ~0.45 so the headline clears a center/right-leaning focal
        # product. Box height ≈ 0.30 of canvas (was 0.22) so a
        # hero-scale 4-line single-word stack ("Refresh / your /
        # summer, / naturally.") at ~80 px fits target_h when the box
        # is too narrow for multi-word wraps.
        headline_box: [0.07, 0.60, 0.78, 0.92]
        text_align: left
        headline_candidate_boxes:
          - [0.07, 0.20, 0.45, 0.50]   # upper-left clean zone (preferred)
          - [0.07, 0.32, 0.46, 0.62]   # mid-left
          - [0.07, 0.46, 0.46, 0.76]   # lower-left
        avoid_busy_regions: true
        busy_region_penalty: 0.35
        object_overlap_penalty: 0.45
        min_contrast_precheck: 3.0
        min_line_count: 2
        max_line_count: 4

      "9x16":
        # Same upper-bias + 0.07 left-margin policy. Box height ≈ 0.30
        # of canvas (was 0.22) so the fitter has room to choose a
        # hero-scale single-word stack on narrow heroes (the only
        # alternative when the box can't fit "Refresh your" on one
        # line). max_line_count raised to 4 so a clean 4-line poster
        # wrap is in-bounds, not min_floor_overflow.
        headline_box: [0.07, 0.64, 0.94, 0.92]
        text_align: left
        headline_candidate_boxes:
          - [0.07, 0.18, 0.45, 0.48]   # upper-left clean zone (preferred)
          - [0.07, 0.32, 0.46, 0.62]   # mid-left
          - [0.07, 0.46, 0.46, 0.76]   # lower-left
        avoid_busy_regions: true
        min_line_count: 2
        max_line_count: 4

      "16x9":
        # 16:9 is the campaign hero shape — candidate boxes are 0.30 high
        # and widened to x_max=0.55 so a 2-line wrap of the demo
        # headline can land at ~95–105px (the practical ceiling for the
        # current campaign string in a left-half box).
        headline_box: [0.04, 0.46, 0.58, 0.93]
        text_align: left
        headline_candidate_boxes:
          - [0.05, 0.36, 0.55, 0.66]   # mid-left (preferred)
          - [0.05, 0.20, 0.55, 0.50]   # upper-left
          - [0.05, 0.50, 0.55, 0.80]   # lower-left
        avoid_busy_regions: true
        min_line_count: 1
        max_line_count: 3

aspect_ratios:
  "1x1":  [1080, 1080]
  "9x16": [1080, 1920]
  "16x9": [1920, 1080]

imagery_style:
  mood: "bright, natural, outdoors"
  avoid: ["dark backgrounds", "artificial lighting", "cluttered scenes"]
  style_prompt_suffix: "photorealistic, vibrant, lifestyle photography, white background"

creative_quality_presets:
  rough_draft: "draft sketch quality, quick concept, fast iteration"
  demo_polished: "premium commercial photography, magazine-quality finish, professional studio lighting, sharp focus, color-graded, social campaign hero, editorial advertising aesthetic"
  production: "premium commercial photography, hero shot, editorial finish, color-graded, retouched, agency-grade"

legal:
  default_disclaimer: "Terms and conditions apply."
  prohibited_words: ["guaranteed", "best", "cure", "clinically proven"]
  required_disclaimers:
    MX: "Aplican términos y condiciones."
    BR: "Consulte os termos e condições."
    CO: "Aplican términos y condiciones."

required_brand_checks:
  palette_match: true
  logo_presence: true
  contrast_ratio: true        # WCAG headline-vs-background contrast QC
  disclaimer_contrast: true   # WCAG disclaimer-vs-background contrast QC

# Quality-control thresholds (WCAG 2.1 AA defaults).
qc:
  min_contrast_ratio: 4.5              # AA normal text (headline)
  large_text_min_ratio: 3.0            # AA for ≥18pt or ≥14pt bold (headline)
  large_text_size_threshold_px: 24
  disclaimer_min_contrast_ratio: 4.5   # legal copy must clear AA normal text

market_locales:
  MX: ["es", "en"]
  BR: ["pt", "en"]
  CO: ["es", "en"]
  US: ["en"]

# =============================================================================
# Localization model — three knobs, three jobs:
#   markets         → DISTRIBUTION (filename prefix, e.g. US_*.png)
#   output_locales  → LANGUAGES rendered per market (filename suffix, e.g. *_es.png)
#   language        → image-gen prompt cue + fallback (one hero per product)
#
# Output count = products × ratios × markets × output_locales.
# Current: 2 × 3 × 1 × 3 = 18 final creatives.
# To drop Portuguese: remove `- pt` from output_locales below → 12 creatives.
# =============================================================================

campaign_id: summer_refresh_2025
campaign_name: Summer Refresh 2025
brand_id: aquacorp_global

# Image-gen prompt cue ("English-speaking audience") + fallback if a locale
# in output_locales has no entry in campaign_message_localized.
language: en

# true = render headlines from campaign_message_localized[locale] per output.
localized_copy: true
# true = render disclaimers from disclaimer_text_localized[locale] per output.
localized_legal_copy: true

force_generate_hero: true
regenerate_cached_assets: true
halt_on_qc_failure: false

# Region cue injected into the image-gen prompt (cultural feel of the hero).
# Does NOT control language fan-out — that's output_locales.
target_region: LATAM

# DISTRIBUTION market(s). Filename prefix. Add a second entry to ship the
# same language set to another market (doubles output count).
markets:
- US

target_audience: Health-conscious adults 25-40
creative_quality: demo_polished
layout_template: premium_product_hero
brand_palette_influence: medium
generation_palette_hint: cyan, deep navy, clean white, fresh water tones, bright summer
  highlights, soft sky and ocean cues

# Translation library. Every code in output_locales below MUST have an entry
# here (validator enforces). Extra entries are harmless.
campaign_message: Refresh your summer, naturally.
campaign_message_localized:
  en: Refresh your summer, naturally.
  es: Refresca tu verano, naturalmente.
  pt: "Renove seu ver\xE3o, naturalmente."

# THIS is the knob that controls how many languages render per market.
# Add/remove entries to change the on-screen language set.
output_locales:
- en
- es
- pt

# Campaign-specific disclaimer override (per-locale). Falls back to brand
# legal copy when a locale entry is missing here. Example for a campaign-
# specific promo override:
#   disclaimer_text_localized:
#     en: "Promotion ends August 31, 2025."
#     es: "Promoción válida hasta el 31 de agosto de 2025."
disclaimer_text: null
disclaimer_text_localized:
  en: Terms and conditions apply.
  es: "Aplican t\xE9rminos y condiciones."
  pt: "Consulte os termos e condi\xE7\xF5es."
products:
- id: aquavita_sparkling
  name: AquaVita Sparkling Water
  category: beverage
  description: Lightly carbonated mineral water with natural fruit essence
  prompt_keywords:
  - premium sparkling water product photography
  - realistic glass bottle hero with light condensation
  - bottle positioned in the right third of the frame, fully visible and not cropped
  - left third of the frame reserved as clean copy-safe negative space
  - simple soft turquoise pool water, calm sky, or pale stone as the left-side backdrop
  - smooth low-detail surfaces behind the copy area, softly out of focus
  - garnish (mint, cucumber, lime) only allowed near the product base on the right side, never in the left third
  - sunlit modern poolside terrace with pale stone surface
  - crisp morning light with fresh spa-like atmosphere
  - shallow depth of field with the copy area gently blurred
  - high-end wellness and resort lifestyle campaign style
  prompt_avoid:
  - embedded text or words in the image
  - tiny fake label text
  - flat placeholder mockup
  - stock-photo cliche
  - garnish, mint, cucumber, lime, fruit slices, bubbles, droplets, or props on the left side of the frame
  - busy patterns, foliage, reflections, ripples, or high-contrast objects in the left third
  - hands, arms, faces, or bodies near the copy area
  - bottle cropped, tilted out of frame, or pushed to the center
  - cluttered tabletop scenes
  - multiple bottles or stacked products
  - sharp horizon lines or strong gradients cutting through the left third
- id: sunguard_spf50
  name: SunGuard SPF 50 Lotion
  category: skincare
  description: Reef-safe broad-spectrum sunscreen for active outdoor use
  prompt_keywords:
  - premium sunscreen and skincare product photography
  - realistic SPF 50 white pump bottle hero with clean highlights
  - beach towel, sunlight, sand, and skincare lifestyle scene
  - soft ocean background with warm summer beach atmosphere
  - bright natural sunlight with gentle shadows and reflections
  - shallow depth of field with product clearly in focus
  - product positioned center-right with clean silhouette
  - clean left-side or lower-left negative space for copy overlay
  - high-end social campaign style

prompt_avoid:
  - embedded text or words in the image
  - tiny fake label text
  - flat placeholder mockup
  - stock-photo cliché
  - busy patterns behind the copy area
  - cluttered beach props
  - hands holding the product
  - crowded beach scene
  - harsh yellow color cast
  - medical or clinical product styling